version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '03:00'
    open-pull-requests-limit: 5
    reviewers:
      - saitarrun
    commit-message:
      prefix: 'chore(deps):'
      include: 'scope'
    allow:
      - dependency-type: 'production'
      - dependency-type: 'development'
    ignore:
      - dependency-name: 'vite'
        versions: ['>=7.0.0'] # Pin major versions
